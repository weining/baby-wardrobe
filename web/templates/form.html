{{define "form"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.title}} - 宝宝衣橱</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- 顶部导航 -->
<nav class="bg-white shadow-sm sticky top-0 z-10">
  <div class="max-w-2xl mx-auto px-4 py-3 flex items-center gap-3">
    <a href="/" class="text-gray-500 hover:text-gray-700">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
    </a>
    <span class="text-lg font-bold text-gray-800">{{.title}}</span>
  </div>
</nav>

<div class="max-w-2xl mx-auto px-4 py-6">
  {{$cloth := .cloth}}
  {{$action := "/clothes"}}
  {{if $cloth.ID}}{{$action = printf "/clothes/%d/edit" $cloth.ID}}{{end}}

  <form action="{{$action}}" method="POST" enctype="multipart/form-data" class="space-y-5">

    <!-- 照片上传 -->
    <div class="bg-white rounded-xl shadow-sm p-4">
      <label class="block text-sm font-medium text-gray-700 mb-3">照片</label>
      <div class="flex items-center gap-4">
        <!-- 预览区 -->
        <div id="preview-wrap" class="w-28 h-28 rounded-xl overflow-hidden bg-gray-100 flex-shrink-0 flex items-center justify-center">
          {{if $cloth.ThumbPath}}
          <img id="preview" src="{{$cloth.ThumbPath}}" class="w-full h-full object-cover">
          {{else}}
          <img id="preview" class="w-full h-full object-cover hidden">
          <span id="preview-placeholder" class="text-3xl text-gray-300">📷</span>
          {{end}}
        </div>
        <div>
          <label for="photo" class="cursor-pointer inline-block bg-blue-50 hover:bg-blue-100 text-blue-600 px-4 py-2 rounded-lg text-sm font-medium transition-colors">
            {{if $cloth.ThumbPath}}更换照片{{else}}选择照片{{end}}
          </label>
          <input type="file" id="photo" name="photo" accept="image/*" capture="environment"
                 class="hidden" onchange="previewPhoto(this)">
          <p class="text-xs text-gray-400 mt-2">支持拍照或从相册选取</p>
        </div>
      </div>
    </div>

    <!-- 基本信息 -->
    <div class="bg-white rounded-xl shadow-sm p-4 space-y-4">
      <h3 class="text-sm font-medium text-gray-700">基本信息</h3>

      <div>
        <label class="block text-sm text-gray-600 mb-1">名称 <span class="text-red-400">*</span></label>
        <input type="text" name="name" value="{{$cloth.Name}}" required
               placeholder="例：蓝色小熊卫衣"
               class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-blue-400">
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm text-gray-600 mb-1">类别 <span class="text-red-400">*</span></label>
          <select name="category" required class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-blue-400">
            {{range .categories}}
            <option value="{{.}}" {{if eq . $cloth.Category}}selected{{end}}>{{.}}</option>
            {{end}}
          </select>
        </div>
        <div>
          <label class="block text-sm text-gray-600 mb-1">季节 <span class="text-red-400">*</span></label>
          <select name="season" required class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-blue-400">
            {{range .seasons}}
            <option value="{{.}}" {{if eq . $cloth.Season}}selected{{end}}>{{.}}</option>
            {{end}}
          </select>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm text-gray-600 mb-1">尺码 <span class="text-red-400">*</span></label>
          <input type="text" name="size" value="{{$cloth.Size}}" required
                 placeholder="例：110、M"
                 class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-blue-400">
        </div>
        <div>
          <label class="block text-sm text-gray-600 mb-1">状态</label>
          <select name="status" class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-blue-400">
            {{range .statuses}}
            <option value="{{.Value}}" {{if eq .Value $cloth.Status}}selected{{end}}>{{.Label}}</option>
            {{end}}
          </select>
        </div>
      </div>
    </div>

    <!-- 选填信息 -->
    <div class="bg-white rounded-xl shadow-sm p-4 space-y-4">
      <h3 class="text-sm font-medium text-gray-700">选填信息</h3>

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm text-gray-600 mb-1">颜色</label>
          <input type="text" name="color" value="{{$cloth.Color}}"
                 placeholder="例：蓝色"
                 class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-blue-400">
        </div>
        <div>
          <label class="block text-sm text-gray-600 mb-1">品牌</label>
          <input type="text" name="brand" value="{{$cloth.Brand}}"
                 placeholder="例：优衣库"
                 class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-blue-400">
        </div>
      </div>

      <div>
        <label class="block text-sm text-gray-600 mb-1">备注</label>
        <textarea name="notes" rows="3" placeholder="例：奶奶买的、有点小、搭配XX裤子..."
                  class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-blue-400 resize-none">{{$cloth.Notes}}</textarea>
      </div>
    </div>

    <!-- 提交按钮 -->
    <div class="flex gap-3 pb-6">
      <a href="/" class="flex-1 text-center bg-gray-100 text-gray-600 rounded-xl py-3 font-medium">取消</a>
      <button type="submit" class="flex-1 bg-blue-500 hover:bg-blue-600 text-white rounded-xl py-3 font-medium transition-colors">
        保存
      </button>
    </div>

  </form>
</div>

<script>
function previewPhoto(input) {
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = function(e) {
      const img = document.getElementById('preview');
      const placeholder = document.getElementById('preview-placeholder');
      img.src = e.target.result;
      img.classList.remove('hidden');
      if (placeholder) placeholder.classList.add('hidden');
    };
    reader.readAsDataURL(input.files[0]);
  }
}
</script>

</body>
</html>
{{end}}
