<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>阿姨工资结算</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #f4faf7;
      --warm-white: #f8fdfb;
      --mint: #e2f5ed;
      --mint-mid: #b8e4d4;
      --mint-deep: #5aa88a;
      --mint-dark: #3d7a65;
      --coral: #f5a994;
      --coral-deep: #e07860;
      --gold-light: #fef8dc;
      --gold-deep: #c9a020;
      --text-dark: #2a4a3a;
      --text-mid: #4a7a62;
      --text-muted: #88a898;
      --text-light: #b8ccbf;
      --shadow-soft: 0 2px 16px rgba(60, 120, 90, 0.10);
      --shadow-hover: 0 8px 32px rgba(60, 120, 90, 0.16);
      --border: rgba(90, 168, 138, 0.18);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: var(--cream);
      background-image:
        radial-gradient(ellipse at 10% 0%, rgba(178, 230, 210, 0.35) 0%, transparent 40%),
        radial-gradient(ellipse at 90% 100%, rgba(200, 240, 225, 0.3) 0%, transparent 40%);
      min-height: 100vh;
      color: var(--text-dark);
    }
    .title-font { font-family: 'Noto Serif SC', serif; }
    nav {
      background: rgba(244, 250, 247, 0.94);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 50;
    }
    .card {
      background: var(--warm-white);
      border-radius: 20px;
      box-shadow: var(--shadow-soft);
      border: 1.5px solid var(--border);
      padding: 20px;
      opacity: 0;
      animation: fadeUp 0.4s ease forwards;
    }
    .card:nth-child(1){animation-delay:0.05s}
    .card:nth-child(2){animation-delay:0.10s}
    .card:nth-child(3){animation-delay:0.15s}
    .card:nth-child(4){animation-delay:0.20s}
    .section-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 14px;
      display: flex; align-items: center; gap: 6px;
    }
    .section-title::after {
      content: '';
      flex: 1; height: 1px;
      background: linear-gradient(90deg, var(--border), transparent);
    }
    label { font-size: 0.78rem; color: var(--text-mid); display: block; margin-bottom: 5px; }
    input[type="number"], input[type="date"] {
      width: 100%;
      background: var(--cream);
      border: 1.5px solid rgba(90, 168, 138, 0.25);
      border-radius: 12px;
      padding: 9px 12px;
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 0.875rem;
      color: var(--text-dark);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus {
      outline: none;
      border-color: var(--mint-deep);
      box-shadow: 0 0 0 3px rgba(90, 168, 138, 0.14);
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--mint-deep), var(--mint-dark));
      color: white;
      border: none;
      border-radius: 12px;
      padding: 10px 22px;
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      box-shadow: 0 2px 10px rgba(60, 122, 101, 0.28);
      transition: all 0.2s ease;
      width: 100%;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(60,122,101,0.38); }
    .btn-sm {
      background: var(--mint);
      color: var(--mint-dark);
      border: 1.5px solid rgba(90, 168, 138, 0.3);
      border-radius: 10px;
      padding: 7px 14px;
      font-size: 0.8rem;
      font-family: 'Noto Sans SC', sans-serif;
      cursor: pointer;
      transition: background 0.2s;
      width: 100%;
    }
    .btn-sm:hover { background: var(--mint-mid); }
    .btn-danger {
      background: rgba(224, 120, 96, 0.12);
      color: var(--coral-deep);
      border: 1.5px solid rgba(224, 120, 96, 0.25);
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 0.72rem;
      font-family: 'Noto Sans SC', sans-serif;
      cursor: pointer;
    }
    .btn-danger:hover { background: rgba(224,120,96,0.22); }
    .stat-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 0;
      border-bottom: 1px dashed rgba(90, 168, 138, 0.12);
      font-size: 0.82rem;
    }
    .stat-row:last-child { border-bottom: none; }
    .stat-label { color: var(--text-muted); }
    .stat-value { color: var(--text-dark); font-weight: 500; }
    .stat-highlight { color: var(--mint-dark); font-size: 1rem; font-family: 'Noto Serif SC', serif; }

    /* Calendar */
    .calendar-nav {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .cal-nav-btn {
      background: var(--mint);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 0.9rem; color: var(--mint-deep);
      transition: background 0.2s;
    }
    .cal-nav-btn:hover { background: var(--mint-mid); }
    .cal-month-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 1rem; font-weight: 600;
      color: var(--text-dark);
    }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
    }
    .cal-weekday {
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-muted);
      padding: 4px 2px;
      letter-spacing: 0.04em;
    }
    .cal-day {
      aspect-ratio: 1;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      color: var(--text-dark);
      position: relative;
      padding: 2px 1px;
      transition: filter 0.15s;
      min-height: 80px;
      user-select: none;
    }
    .cal-day:not(.empty):hover { filter: brightness(0.94); }
    .cal-day.normal { background: rgba(255,255,255,0.6); }
    .cal-day.today { box-shadow: 0 0 0 2px var(--mint-deep); }
    .cal-day.payday {
      background: linear-gradient(135deg, #c8f0e0, #a8e4cc);
      color: var(--mint-dark);
      font-weight: 600;
      box-shadow: 0 2px 8px rgba(90,168,138,0.25);
    }
    .cal-day.double-pay {
      background: linear-gradient(135deg, #fef9e0, #fde68a);
      color: #7a5800;
    }
    .cal-day.leave-day {
      background: rgba(224, 120, 96, 0.1);
      color: var(--coral-deep);
    }
    .cal-day.leave-double {
      background: rgba(253, 230, 138, 0.45);
      color: #9a6800;
    }
    .cal-day.empty { background: transparent; }
    .cal-day-num { font-size: 1.2rem; line-height: 1; }
    .cal-day-sub {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 1px;
      line-height: 1.1;
      text-align: center;
      max-width: 100%;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .cal-day.payday .cal-day-sub { color: var(--mint-dark); font-weight: 600; }
    .cal-day.double-pay .cal-day-sub { color: #7a5800; }
    .cal-day.leave-day .cal-day-sub { color: var(--coral-deep); }
    .cal-day-lunar {
      font-size: 0.66rem;
      color: var(--text-light);
      margin-top: 1px;
      line-height: 1;
      text-align: center;
    }
    .cal-day.payday .cal-day-lunar { color: rgba(61,122,101,0.6); }
    .cal-day.double-pay .cal-day-lunar { color: rgba(122,88,0,0.5); }
    .indicator {
      position: absolute;
      top: 3px; right: 4px;
      width: 5px; height: 5px;
      border-radius: 50%;
    }
    .indicator.payday-ind { background: var(--mint-dark); }
    .indicator.double-ind { background: var(--gold-deep); }

    .legend {
      display: flex; flex-wrap: wrap; gap: 10px;
      margin-top: 16px;
    }
    .legend-item {
      display: flex; align-items: center; gap: 5px;
      font-size: 0.72rem; color: var(--text-muted);
    }
    .legend-swatch {
      width: 12px; height: 12px; border-radius: 4px;
    }

    .payday-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      background: var(--warm-white);
      margin-bottom: 8px;
    }
    .payday-item.next-pay {
      background: linear-gradient(135deg, #f0faf6, #e2f5ed);
      border-color: rgba(90,168,138,0.3);
    }
    .payday-item.past { opacity: 0.5; }
    .pd-date { font-weight: 500; font-size: 0.85rem; }
    .pd-label { font-size: 0.7rem; color: var(--text-muted); }
    .pd-amount { font-family: 'Noto Serif SC', serif; color: var(--mint-dark); font-size: 0.9rem; }
    .pd-days { font-size: 0.7rem; color: var(--text-muted); text-align: right; }

    .leave-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 12px;
      background: rgba(224,120,96,0.06);
      border-radius: 10px;
      border: 1px solid rgba(224,120,96,0.15);
      margin-bottom: 8px;
      font-size: 0.8rem;
      color: var(--text-mid);
    }
    .empty-hint {
      font-size: 0.78rem;
      color: var(--text-muted);
      text-align: center;
      padding: 8px 0;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 480px) {
      .cal-grid { gap: 2px; }
      .cal-weekday {
        font-size: 0.72rem;
        padding: 3px 1px;
      }
      .cal-day {
        aspect-ratio: auto;
        min-height: 62px;
        padding: 6px 1px 4px;
        justify-content: flex-start;
      }
      .cal-day-num {
        font-size: 1rem;
        line-height: 1.05;
      }
      .cal-day-sub {
        display: block;
        font-size: 0.58rem;
        margin-top: 2px;
        line-height: 1.05;
        max-width: 100%;
      }
      .cal-day-lunar {
        display: block;
        font-size: 0.54rem;
        margin-top: 1px;
        line-height: 1.05;
        max-width: 100%;
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
      }
      .indicator {
        top: 4px;
        right: 4px;
      }
    }
  </style>
</head>
<body>

<!-- 顶部导航 -->
<nav>
  <div class="max-w-3xl mx-auto px-4 py-3 flex items-center gap-3">
    <a href="/" style="color:var(--text-muted);display:flex;align-items:center;">
      <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
    </a>
    <span style="font-size:1.2rem;">💰</span>
    <span class="title-font" style="font-size:1rem;font-weight:600;color:var(--text-dark);">阿姨工资结算</span>
  </div>
</nav>

<div class="max-w-3xl mx-auto px-4 py-5" style="display:flex;flex-direction:column;gap:16px;">

  <!-- 1. 基础设置 -->
  <div class="card">
    <div class="section-title">⚙ 基础设置</div>
    <!-- 已保存状态展示 -->
    <div id="savedDisplay" style="display:none;margin-bottom:14px;">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">
        <div style="background:var(--mint);border-radius:12px;padding:12px 14px;">
          <div style="font-size:0.7rem;color:var(--text-muted);margin-bottom:4px;">月工资</div>
          <div id="savedSalaryDisplay" style="font-family:'Noto Serif SC',serif;font-size:1.1rem;color:var(--mint-dark);font-weight:600;"></div>
        </div>
        <div style="background:var(--mint);border-radius:12px;padding:12px 14px;">
          <div style="font-size:0.7rem;color:var(--text-muted);margin-bottom:4px;">首次发工资日</div>
          <div id="savedPaydayDisplay" style="font-size:0.85rem;color:var(--text-dark);font-weight:500;"></div>
        </div>
      </div>
      <button class="btn-sm" onclick="enterEditMode()" style="margin-bottom:0;">✏ 修改设置</button>
    </div>
    <!-- 编辑表单 -->
    <div id="editForm">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;">
        <div>
          <label for="monthlySalary">月工资（元）</label>
          <input type="number" id="monthlySalary" placeholder="例如：5000" min="100" step="100">
        </div>
        <div>
          <label for="firstPayday">首次发工资日期</label>
          <input type="text" id="firstPayday" placeholder="2025-03-05" maxlength="10">
        </div>
      </div>
      <div style="display:flex;gap:10px;">
        <button class="btn-primary" style="flex:1;" onclick="saveAndCompute()">保存并计算</button>
        <button id="cancelEditBtn" class="btn-sm" style="width:auto;padding:10px 16px;display:none;" onclick="cancelEdit()">取消</button>
      </div>
    </div>
  </div>

  <!-- 2. 请假管理 -->
  <div class="card">
    <div class="section-title">🌿 请假管理</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">
      <div>
        <label for="leaveStart">请假开始</label>
        <input type="text" id="leaveStart" placeholder="2025-03-18" maxlength="10">
      </div>
      <div>
        <label for="leaveEnd">请假结束</label>
        <input type="text" id="leaveEnd" placeholder="2025-03-20" maxlength="10">
      </div>
    </div>
    <button class="btn-sm" style="margin-bottom:12px;" onclick="addLeave()">＋ 添加请假记录</button>
    <div id="leaveList"></div>
  </div>

  <!-- 3. 结算概览 (hidden initially) -->
  <div class="card" id="summaryCard" style="display:none;">
    <div class="section-title">📊 结算概览</div>
    <div id="summaryRows"></div>
  </div>

  <!-- 4. 日历 (hidden initially) -->
  <div class="card" id="calendarCard" style="display:none;">
    <div class="section-title">📅 工资日历</div>
    <div class="calendar-nav">
      <button class="cal-nav-btn" onclick="prevMonth()">‹</button>
      <div class="cal-month-title" id="calTitle"></div>
      <button class="cal-nav-btn" onclick="nextMonth()">›</button>
    </div>
    <div class="cal-grid" id="calWeekdays"></div>
    <div class="cal-grid" id="calBody" style="margin-top:3px;"></div>
    <div class="legend">
      <div class="legend-item">
        <div class="legend-swatch" style="background:linear-gradient(135deg,#c8f0e0,#a8e4cc);"></div>
        <span>发工资日</span>
      </div>
      <div class="legend-item">
        <div class="legend-swatch" style="background:linear-gradient(135deg,#fef9e0,#fde68a);"></div>
        <span>双倍工资日</span>
      </div>
      <div class="legend-item">
        <div class="legend-swatch" style="background:rgba(224,120,96,0.18);"></div>
        <span>请假日</span>
      </div>
      <div class="legend-item">
        <div class="legend-swatch" style="box-shadow:0 0 0 2px var(--mint-deep);background:transparent;"></div>
        <span>今天</span>
      </div>
    </div>
  </div>

  <!-- 5. 近期发工资日 (hidden initially) -->
  <div class="card" id="upcomingCard" style="display:none;">
    <div class="section-title">💵 近期发工资日</div>
    <div id="upcomingList"></div>
  </div>

  <div style="height:24px;"></div>
</div>

function getHolidayName(d) {
  const full = toStr(d);
  if (LUNAR_HOLIDAY_NAMES[full]) return LUNAR_HOLIDAY_NAMES[full];
  const mmdd = pad(d.getMonth()+1) + '-' + pad(d.getDate());
  return HOLIDAY_NAMES[mmdd] || '';
}

function isDoubleDay(d) {
  const m = d.getMonth()+1, day = d.getDate();
  if (FIXED_HOLIDAYS.some(([fm,fd]) => fm===m && fd===day)) return true;
  return LUNAR_HOLIDAY_SET.has(toStr(d));
}

const heavenlyStems = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
const earthlyBranches = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const chineseDayNames = ['初一','初二','初三','初四','初五','初六','初七','初八','初九','初十',
  '十一','十二','十三','十四','十五','十六','十七','十八','十九','二十',
  '廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'];
const chineseMonthNames = ['正','二','三','四','五','六','七','八','九','十','冬','腊'];

function getLunarDate(date) {
  const baseDate = new Date(1900, 0, 31);
  let offset = Math.round((date - baseDate) / 86400000);
  let lunarYear = 1900, daysInYear;
  for (lunarYear = 1900; lunarYear < 2100 && offset > 0; lunarYear++) {
    daysInYear = lunarYearDays(lunarYear);
    offset -= daysInYear;
  }
  if (offset < 0) { offset += lunarYearDays(--lunarYear); }

  const leapMonth = leapMonthOfYear(lunarYear);
  let isLeap = false;
  let lunarMonth, daysInMonth;
  for (lunarMonth = 1; lunarMonth < 13 && offset > 0; lunarMonth++) {
    if (leapMonth > 0 && lunarMonth === leapMonth + 1 && !isLeap) {
      --lunarMonth; isLeap = true;
      daysInMonth = leapDaysOfYear(lunarYear);
    } else {
      daysInMonth = monthDaysOfYear(lunarYear, lunarMonth);
    }
    if (isLeap && lunarMonth === leapMonth + 1) isLeap = false;
    offset -= daysInMonth;
  }
  if (offset === 0 && leapMonth > 0 && lunarMonth === leapMonth + 1) {
    if (isLeap) isLeap = false;
    else { isLeap = true; --lunarMonth; }
  }
  if (offset < 0) { offset += daysInMonth; --lunarMonth; }
  return { year: lunarYear, month: lunarMonth, day: offset + 1, isLeap };
}

function lunarYearDays(y) {
  let sum = 348;
  for (let i = 0x8000; i > 0x8; i >>= 1) {
    sum += (lunarInfo[y - 1900] & i) ? 1 : 0;
  }
  return sum + leapDaysOfYear(y);
}
function leapDaysOfYear(y) {
  if (leapMonthOfYear(y)) {
    return (lunarInfo[y - 1900] & 0xf) ? 30 : 29;
  }
  return 0;
}
function leapMonthOfYear(y) { return lunarInfo[y - 1900] & 0xf; }
function monthDaysOfYear(y, m) {
  return (lunarInfo[y - 1900] & (0x10000 >> m)) ? 30 : 29;
}

function lunarDayStr(date) {
  try {
    const lunar = getLunarDate(date);
    const d = lunar.day;
    const mName = (lunar.isLeap ? '闰' : '') + chineseMonthNames[lunar.month - 1];
    if (d === 1) return mName + '月';
    return chineseDayNames[d - 1];
  } catch (e) {
    return '';
  }
}

// ============================================================
// STATE
// ============================================================
let leaveRanges = [];
let paydays = [];
let salary = 0;
let calYear, calMonth;
let hasSavedConfig = false;

// ============================================================
// UTILITIES
// ============================================================
function toStr(d) {
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}
function pad(n){ return String(n).padStart(2,'0'); }
function fromStr(s) {
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y,m-1,d);
}
function addDays(d,n) {
  const r = new Date(d); r.setDate(r.getDate()+n); return r;
}
function today0() {
  const t = new Date(); t.setHours(0,0,0,0); return t;
}
function isLeaveDay(d) {
  const k = toStr(d);
  return leaveRanges.some(r => toStr(r.s) <= k && k <= toStr(r.e));
}
function isPayday(d) {
  const k = toStr(d);
  return paydays.some(p => toStr(p) === k);
}
function weekdayStr(d) {
  return ['日','一','二','三','四','五','六'][d.getDay()];
}
function fmtFull(d) {
  return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日（周'+weekdayStr(d)+'）';
}
function fmtShort(d) {
  return (d.getMonth()+1)+'月'+d.getDate()+'日';
}

// ============================================================
// SALARY LOGIC (integer units, avoids float errors)
// ============================================================
function dailyUnits(d) {
  const leave = isLeaveDay(d);
  const dbl   = isDoubleDay(d);
  if (leave && dbl)  return 1;
  if (leave)         return 0;
  if (dbl)           return 2;
  return 1;
}

function nextPayday(fromDate) {
  let units = 0, cur = addDays(fromDate, 1), safety = 0;
  while (units < 26 && safety < 2000) {
    units += dailyUnits(cur);
    if (units < 26) { cur = addDays(cur, 1); }
    safety++;
  }
  return new Date(cur);
}

function computePaydays(first, count) {
  const list = [new Date(first)];
  for (let i = 0; i < count-1; i++) {
    list.push(nextPayday(list[list.length-1]));
  }
  return list;
}

// 当天处于哪个工资周期，且是第几天（从1计）
// 返回 {cycleStart: Date, cycleEnd: Date, dayInCycle: Number} 或 null
function getCycleInfo(date) {
  if (paydays.length < 2) return null;
  const k = toStr(date);
  for (let i = 0; i < paydays.length - 1; i++) {
    const cycleStart = paydays[i];
    const cycleEnd   = paydays[i + 1];
    const csStr = toStr(cycleStart), ceStr = toStr(cycleEnd);
    if (k > csStr && k <= ceStr) {
      // count calendar days from day after cycleStart up to date
      let dayCount = 0;
      let cur = addDays(cycleStart, 1);
      while (toStr(cur) <= k) {
        dayCount++;
        cur = addDays(cur, 1);
      }
      return { cycleStart, cycleEnd, dayInCycle: dayCount };
    }
  }
  return null;
}

// ============================================================
// CONFIG SAVE / LOAD
// ============================================================
function saveAndCompute() {
  const salVal = parseFloat(document.getElementById('monthlySalary').value);
  const pdStr  = document.getElementById('firstPayday').value.trim();
  if (!salVal || salVal <= 0) { alert('请输入有效的月工资'); return; }
  if (!pdStr) { alert('请输入首次发工资日期'); return; }
  if (!/^\d{4}-\d{2}-\d{2}$/.test(pdStr)) { alert('日期格式错误，请使用 YYYY-MM-DD，例如 2025-03-05'); return; }
  if (isNaN(fromStr(pdStr))) { alert('日期无效，请检查'); return; }

  // Save to backend
  fetch('/nanny-salary/config', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ monthly_salary: salVal, first_payday: pdStr }),
  }).catch(() => {}); // Fire and forget; compute regardless

  applyConfig(salVal, pdStr);
  showSavedDisplay(salVal, pdStr);
}

function applyConfig(salVal, pdStr) {
  salary = salVal;
  const firstPD = fromStr(pdStr);
  paydays = computePaydays(firstPD, 14);

  renderSummary();
  renderUpcoming();

  const t = today0();
  const upcoming = paydays.filter(p => p >= t);
  const target = upcoming.length > 0 ? upcoming[0] : t;
  calYear = target.getFullYear();
  calMonth = target.getMonth();

  document.getElementById('summaryCard').style.display = 'block';
  document.getElementById('calendarCard').style.display = 'block';
  document.getElementById('upcomingCard').style.display = 'block';
  renderCalendar();
}

function showSavedDisplay(salVal, pdStr) {
  document.getElementById('savedSalaryDisplay').textContent = '¥' + Number(salVal).toFixed(0) + ' 元/月';
  document.getElementById('savedPaydayDisplay').textContent = pdStr;
  document.getElementById('savedDisplay').style.display = 'block';
  document.getElementById('editForm').style.display = 'none';
  document.getElementById('cancelEditBtn').style.display = 'none';
  hasSavedConfig = true;
}

function enterEditMode() {
  document.getElementById('savedDisplay').style.display = 'none';
  document.getElementById('editForm').style.display = 'block';
  if (hasSavedConfig) document.getElementById('cancelEditBtn').style.display = 'inline-block';
}

function cancelEdit() {
  document.getElementById('editForm').style.display = 'none';
  document.getElementById('savedDisplay').style.display = 'block';
}

// Legacy alias kept for HTML button onclick
function compute() { saveAndCompute(); }

// ============================================================
// LEAVE
// ============================================================
function addLeave() {
  const s = document.getElementById('leaveStart').value.trim();
  const e = document.getElementById('leaveEnd').value.trim();
  if (!s || !e) { alert('请输入请假开始和结束日期'); return; }
  const dateRe = /^\d{4}-\d{2}-\d{2}$/;
  if (!dateRe.test(s) || !dateRe.test(e)) { alert('日期格式错误，请使用 YYYY-MM-DD，例如 2025-03-18'); return; }
  const sd = fromStr(s), ed = fromStr(e);
  if (isNaN(sd) || isNaN(ed)) { alert('日期无效，请检查格式'); return; }
  if (sd > ed) { alert('开始日期不能晚于结束日期'); return; }
  leaveRanges.push({s: sd, e: ed});
  leaveRanges.sort((a,b) => a.s - b.s);
  document.getElementById('leaveStart').value = '';
  document.getElementById('leaveEnd').value = '';
  renderLeaveList();
  if (salary > 0 && paydays.length > 0) {
    paydays = computePaydays(paydays[0], 14);
    renderSummary();
    renderUpcoming();
    renderCalendar();
  }
}

function removeLeave(idx) {
  leaveRanges.splice(idx, 1);
  renderLeaveList();
  if (salary > 0 && paydays.length > 0) {
    paydays = computePaydays(paydays[0], 14);
    renderSummary();
    renderUpcoming();
    renderCalendar();
  }
}

function renderLeaveList() {
  const el = document.getElementById('leaveList');
  while (el.firstChild) el.removeChild(el.firstChild);
  if (leaveRanges.length === 0) {
    const hint = document.createElement('div');
    hint.className = 'empty-hint';
    hint.textContent = '暂无请假记录';
    el.appendChild(hint);
    return;
  }
  leaveRanges.forEach((r, i) => {
    const days = Math.round((r.e - r.s) / 86400000) + 1;
    const row = document.createElement('div');
    row.className = 'leave-row';
    const text = document.createElement('span');
    text.textContent = '🌿 ' + fmtShort(r.s) + ' — ' + fmtShort(r.e) + '（' + days + '天）';
    const btn = document.createElement('button');
    btn.className = 'btn-danger';
    btn.textContent = '删除';
    btn.addEventListener('click', () => removeLeave(i));
    row.appendChild(text);
    row.appendChild(btn);
    el.appendChild(row);
  });
}

// ============================================================
// SUMMARY
// ============================================================
function renderSummary() {
  const el = document.getElementById('summaryRows');
  while (el.firstChild) el.removeChild(el.firstChild);
  const unit = salary / 26;
  const t = today0();
  const upcoming = paydays.filter(p => p >= t);

  function row(label, valueText, highlight) {
    const d = document.createElement('div');
    d.className = 'stat-row';
    const l = document.createElement('span');
    l.className = 'stat-label';
    l.textContent = label;
    const v = document.createElement('span');
    v.className = highlight ? 'stat-value stat-highlight' : 'stat-value';
    v.textContent = valueText;
    d.appendChild(l);
    d.appendChild(v);
    el.appendChild(d);
  }

  row('月工资', '¥' + salary.toFixed(0), true);
  row('日工资（非双倍日）', '¥' + unit.toFixed(2));
  row('双倍工资日日薪', '¥' + (unit*2).toFixed(2));
  row('结算方式', '累计满 26 个工资单位发一次');
  if (upcoming.length > 0) {
    const nextPD = upcoming[0];
    const dLeft = Math.round((nextPD - t) / 86400000);
    row('下次发工资', fmtFull(nextPD) + (dLeft === 0 ? '（今天！）' : '（' + dLeft + '天后）'));
  }
  if (leaveRanges.length > 0) {
    row('请假记录', leaveRanges.length + ' 段');
  }
}

// ============================================================
// UPCOMING PAYDAYS
// ============================================================
function renderUpcoming() {
  const el = document.getElementById('upcomingList');
  while (el.firstChild) el.removeChild(el.firstChild);
  const t = today0();
  paydays.slice(0, 10).forEach((pd, i) => {
    const isPast = pd < t;
    const isNext = !isPast && (i === 0 || paydays[i-1] < t);
    const dLeft  = Math.round((pd - t) / 86400000);
    const item = document.createElement('div');
    item.className = 'payday-item' + (isNext ? ' next-pay' : '') + (isPast ? ' past' : '');

    const left = document.createElement('div');
    const dateEl = document.createElement('div');
    dateEl.className = 'pd-date';
    dateEl.textContent = fmtFull(pd);
    const labelEl = document.createElement('div');
    labelEl.className = 'pd-label';
    labelEl.textContent = isNext ? '⭐ 下次发工资' : isPast ? '已发' : '';
    left.appendChild(dateEl);
    left.appendChild(labelEl);

    const right = document.createElement('div');
    const amtEl = document.createElement('div');
    amtEl.className = 'pd-amount';
    amtEl.textContent = '¥' + salary.toFixed(0);
    const daysEl = document.createElement('div');
    daysEl.className = 'pd-days';
    daysEl.textContent = dLeft > 0 ? dLeft+'天后' : dLeft === 0 ? '今天' : (-dLeft)+'天前';
    right.appendChild(amtEl);
    right.appendChild(daysEl);

    item.appendChild(left);
    item.appendChild(right);
    el.appendChild(item);
  });
}

// ============================================================
// CALENDAR
// ============================================================
function renderCalendar() {
  const y = calYear, m = calMonth;
  const monthNames = ['一','二','三','四','五','六','七','八','九','十','十一','十二'];
  document.getElementById('calTitle').textContent = y + '年 ' + monthNames[m] + '月';

  const wdEl = document.getElementById('calWeekdays');
  while (wdEl.firstChild) wdEl.removeChild(wdEl.firstChild);
  ['日','一','二','三','四','五','六'].forEach(w => {
    const d = document.createElement('div');
    d.className = 'cal-weekday';
    d.textContent = w;
    wdEl.appendChild(d);
  });

  const firstDow = new Date(y, m, 1).getDay();
  const daysInM  = new Date(y, m+1, 0).getDate();
  const t = today0();

  const body = document.getElementById('calBody');
  while (body.firstChild) body.removeChild(body.firstChild);

  for (let i = 0; i < firstDow; i++) {
    const e = document.createElement('div');
    e.className = 'cal-day empty';
    body.appendChild(e);
  }

  for (let day = 1; day <= daysInM; day++) {
    const date = new Date(y, m, day);
    const isToday  = toStr(date) === toStr(t);
    const isPD     = isPayday(date);
    const isDbl    = isDoubleDay(date);
    const isLeave  = isLeaveDay(date);
    const cycleInfo = getCycleInfo(date);
    const holidayName = getHolidayName(date);
    const lunarStr = lunarDayStr(date);

    const cell = document.createElement('div');
    let cls = 'cal-day';
    if (isPD)                  cls += ' payday';
    else if (isLeave && isDbl) cls += ' leave-double';
    else if (isLeave)          cls += ' leave-day';
    else if (isDbl)            cls += ' double-pay';
    else                       cls += ' normal';
    if (isToday) cls += ' today';
    cell.className = cls;

    let titleParts = [];
    if (isPD)             titleParts.push('发工资日');
    if (isDbl && isLeave) titleParts.push('双倍日（请假计单倍）');
    else if (isDbl)       titleParts.push('双倍工资日');
    if (isLeave)          titleParts.push('请假');
    if (cycleInfo)        titleParts.push('本周期第' + cycleInfo.dayInCycle + '天');
    if (titleParts.length) cell.title = titleParts.join(' · ');

    // Indicator dot (top-right)
    if (isPD) {
      const dot = document.createElement('div');
      dot.className = 'indicator payday-ind';
      cell.appendChild(dot);
    } else if (isDbl && !isLeave) {
      const dot = document.createElement('div');
      dot.className = 'indicator double-ind';
      cell.appendChild(dot);
    }

    // Day number (large)
    const num = document.createElement('div');
    num.className = 'cal-day-num';
    num.textContent = String(day);
    cell.appendChild(num);

    // Sub line 1: cycle day OR holiday name (priority: holiday name > cycle day)
    const sub1 = document.createElement('div');
    sub1.className = 'cal-day-sub';
    if (isPD) {
      sub1.textContent = '发薪日';
      sub1.style.color = 'var(--mint-dark)';
      sub1.style.fontWeight = '600';
    } else if (holidayName) {
      sub1.textContent = holidayName;
      sub1.style.color = isDbl ? '#7a5800' : 'var(--coral-deep)';
    } else if (cycleInfo) {
      sub1.textContent = '第' + cycleInfo.dayInCycle + '天';
    }
    cell.appendChild(sub1);

    // Sub line 2: lunar date
    const sub2 = document.createElement('div');
    sub2.className = 'cal-day-lunar';
    sub2.textContent = lunarStr;
    cell.appendChild(sub2);

    body.appendChild(cell);
  }
}

function prevMonth() {
  calMonth--;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar();
}
function nextMonth() {
  calMonth++;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar();
}

// ============================================================
// INIT — load saved config from server (injected by Go template)
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  renderLeaveList();

  const savedSalary  = {{if .config.MonthlySalary}}{{.config.MonthlySalary}}{{else}}0{{end}};
  const savedPayday  = "{{.config.FirstPayday}}";

  if (savedSalary > 0 && savedPayday !== "") {
    // Pre-fill form inputs
    document.getElementById('monthlySalary').value = savedSalary;
    document.getElementById('firstPayday').value = savedPayday;
    // Show saved display and auto-compute
    showSavedDisplay(savedSalary, savedPayday);
    applyConfig(savedSalary, savedPayday);
  } else {
    document.getElementById('firstPayday').value = toStr(today0());
  }
});
</script>
