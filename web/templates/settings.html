{{define "settings"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设置 - 悠悠衣橱</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #fdf8f3;
      --warm-white: #fff9f5;
      --blush: #f9ede8;
      --rose: #e8a89c;
      --rose-deep: #d4786a;
      --caramel: #c9956b;
      --caramel-light: #f5ead8;
      --text-warm: #5c4a3a;
      --text-muted: #a09080;
      --text-light: #c8b8a8;
      --shadow-soft: 0 2px 12px rgba(200, 150, 120, 0.12);
    }
    body {
      font-family: 'Noto Sans SC', sans-serif;
      background-color: var(--cream);
      background-image:
        radial-gradient(circle at 10% 10%, rgba(249, 237, 232, 0.6) 0%, transparent 40%),
        radial-gradient(circle at 90% 90%, rgba(232, 245, 240, 0.4) 0%, transparent 40%);
      min-height: 100vh;
    }
    .title-font { font-family: 'Noto Serif SC', serif; }
    nav {
      background: rgba(255, 252, 248, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(212, 178, 160, 0.2);
    }
    .section-card {
      background: var(--warm-white);
      border-radius: 20px;
      box-shadow: var(--shadow-soft);
      border: 1px solid rgba(212, 178, 160, 0.15);
      overflow: hidden;
    }
    .section-header {
      padding: 14px 18px;
      border-bottom: 1px solid rgba(212, 178, 160, 0.15);
      background: linear-gradient(135deg, rgba(249,237,232,0.4) 0%, rgba(255,252,248,0) 100%);
    }
    .section-header h2 {
      font-family: 'Noto Serif SC', serif;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-warm);
    }
    .section-header p {
      font-size: 0.72rem;
      color: var(--text-light);
      margin-top: 3px;
    }
    .list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 18px;
      border-bottom: 1px solid rgba(212, 178, 160, 0.08);
    }
    .list-item:last-child { border-bottom: none; }
    .list-item-text {
      font-size: 0.875rem;
      color: var(--text-warm);
    }
    .delete-text-btn {
      font-size: 0.75rem;
      color: #cc7777;
      padding: 4px 10px;
      border-radius: 8px;
      background: transparent;
      border: none;
      cursor: pointer;
      font-family: 'Noto Sans SC', sans-serif;
      transition: background 0.2s;
    }
    .delete-text-btn:hover { background: #fce8e8; }
    .footer-form {
      padding: 14px 18px;
      background: rgba(249, 237, 232, 0.3);
      border-top: 1px solid rgba(212, 178, 160, 0.12);
    }
    input[type="text"], select {
      background: var(--cream);
      border: 1.5px solid rgba(212, 178, 160, 0.35);
      border-radius: 12px;
      color: var(--text-warm);
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 0.875rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input[type="text"]:focus, select:focus {
      outline: none;
      border-color: var(--rose);
      box-shadow: 0 0 0 3px rgba(232, 168, 156, 0.18);
      background: white;
    }
    .btn-add {
      background: linear-gradient(135deg, #e8a89c, #d4786a);
      color: white;
      border-radius: 12px;
      padding: 8px 16px;
      font-size: 0.82rem;
      font-weight: 500;
      font-family: 'Noto Sans SC', sans-serif;
      border: none;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(212, 120, 106, 0.3);
      transition: all 0.2s;
      white-space: nowrap;
    }
    .btn-add:hover {
      background: linear-gradient(135deg, #d4786a, #c06858);
      box-shadow: 0 4px 12px rgba(212, 120, 106, 0.4);
      transform: translateY(-1px);
    }
    .save-text-btn {
      font-size: 0.75rem;
      color: var(--rose-deep);
      padding: 4px 10px;
      border-radius: 8px;
      background: transparent;
      border: none;
      cursor: pointer;
      font-family: 'Noto Sans SC', sans-serif;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .save-text-btn:hover { background: #fce8e4; }
    .color-badge {
      border-radius: 16px;
      padding: 3px 10px;
      font-size: 0.72rem;
      font-weight: 500;
    }
    .status-tag-green  { background: #e8f5f0; color: #5a9e8a; }
    .status-tag-blue   { background: #e8eef8; color: #6688bb; }
    .status-tag-yellow { background: #fdf3e3; color: #c9956b; }
    .status-tag-red    { background: #fce8e8; color: #cc6666; }
    .status-tag-purple { background: #f0ebf8; color: #8866bb; }
    .status-tag-gray   { background: #f0eae4; color: #a09080; }
    .error-banner {
      background: #fdf0f0;
      border: 1px solid rgba(220, 100, 100, 0.25);
      color: #bb5555;
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 0.875rem;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up   { animation: fadeUp 0.35s ease both; }
    .fade-up-1 { animation: fadeUp 0.35s ease 0.06s both; }
    .fade-up-2 { animation: fadeUp 0.35s ease 0.12s both; }
    .mono { font-family: 'Courier New', monospace; }
    .status-edit-row {
      padding: 10px 18px;
      border-bottom: 1px solid rgba(212, 178, 160, 0.08);
    }
  </style>
</head>
<body>

<nav class="sticky top-0 z-10">
  <div class="max-w-2xl mx-auto px-4 py-3 flex items-center gap-3">
    <a href="/" style="color: var(--text-muted);" class="p-1 hover:opacity-70 transition-opacity">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M15 19l-7-7 7-7"/>
      </svg>
    </a>
    <span class="title-font text-base font-semibold" style="color: var(--text-warm);">设置</span>
  </div>
</nav>

<div class="max-w-2xl mx-auto px-4 py-6 space-y-5">

  {{if .error}}
  <div class="error-banner fade-up">{{.error}}</div>
  {{end}}

  <!-- 类别管理 -->
  <div class="section-card fade-up">
    <div class="section-header">
      <h2>🗂 类别管理</h2>
      <p>管理衣物分类，有衣物的类别无法删除</p>
    </div>

    <div>
      {{range .categories}}
      <div class="list-item">
        <span class="list-item-text">{{.}}</span>
        <form method="POST" action="/settings/categories/{{.}}/delete"
              onsubmit="return confirm('确定删除类别「{{.}}」？')">
          <button type="submit" class="delete-text-btn">删除</button>
        </form>
      </div>
      {{end}}
    </div>

    <div class="footer-form">
      <form method="POST" action="/settings/categories" class="flex gap-2">
        <input type="text" name="name" placeholder="新类别，如：连体衣"
               required
               class="flex-1 px-3 py-2">
        <button type="submit" class="btn-add">+ 添加</button>
      </form>
    </div>
  </div>

  <!-- 状态管理 -->
  <div class="section-card fade-up-1">
    <div class="section-header">
      <h2>🏷 状态管理</h2>
      <p>管理衣物状态标签，有衣物的状态无法删除</p>
    </div>

    <div>
      {{range .statuses}}
      <div class="status-edit-row">
        <form method="POST" action="/settings/statuses/{{.ID}}/edit">
          <div class="flex items-center gap-2 flex-wrap">
            <!-- 颜色预览 -->
            <span class="color-badge flex-shrink-0
              {{if eq .Color "green"}}status-tag-green
              {{else if eq .Color "blue"}}status-tag-blue
              {{else if eq .Color "yellow"}}status-tag-yellow
              {{else if eq .Color "red"}}status-tag-red
              {{else if eq .Color "purple"}}status-tag-purple
              {{else}}status-tag-gray{{end}}">
              {{.Label}}
            </span>

            <!-- 标识 -->
            <span class="mono text-xs flex-shrink-0" style="color: var(--text-light);">{{.Value}}</span>

            <!-- 名称编辑 -->
            <input type="text" name="label" value="{{.Label}}" required
                   class="flex-1 px-2 py-1.5 min-w-0" style="min-width: 80px;">

            <!-- 颜色选择 -->
            <select name="color" class="px-2 py-1.5 flex-shrink-0">
              {{range $.colors}}
              <option value="{{.Value}}" {{if eq .Value $.Color}}selected{{end}}>{{.Label}}</option>
              {{end}}
            </select>

            <button type="submit" class="save-text-btn flex-shrink-0">保存</button>
          </div>
        </form>
        <div class="flex justify-end mt-1">
          <form method="POST" action="/settings/statuses/{{.ID}}/delete"
                onsubmit="return confirm('确定删除状态「{{.Label}}」？')">
            <button type="submit" class="delete-text-btn">删除</button>
          </form>
        </div>
      </div>
      {{end}}
    </div>

    <div class="footer-form">
      <p style="font-size: 0.72rem; color: var(--text-muted); margin-bottom: 10px; letter-spacing: 0.05em;">添加新状态</p>
      <form method="POST" action="/settings/statuses" class="space-y-2">
        <div class="flex gap-2">
          <div class="flex-1">
            <input type="text" name="value" placeholder="唯一标识（英文），如：lending"
                   required pattern="[a-z_]+"
                   class="w-full px-3 py-2">
            <p style="font-size: 0.68rem; color: var(--text-light); margin-top: 4px;">仅小写字母和下划线</p>
          </div>
          <input type="text" name="label" placeholder="显示名称，如：借出"
                 required
                 class="flex-1 px-3 py-2">
        </div>
        <div class="flex gap-2">
          <select name="color" class="flex-1 px-3 py-2">
            {{range .colors}}
            <option value="{{.Value}}">{{.Label}}</option>
            {{end}}
          </select>
          <button type="submit" class="btn-add">+ 添加</button>
        </div>
      </form>
    </div>
  </div>

  <div class="h-6"></div>
</div>
</body>
</html>
{{end}}
